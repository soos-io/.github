name: Publish to NPM (Pre-release + Release)

on:
  # Manual trigger for pre-releases
  workflow_dispatch:
    inputs:
      version:
        description: "The version to publish (format: x.x.x-pre.x)"
        required: true
        type: string
      shrinkwrap:
        description: "Generate npm-shrinkwrap.json before publish"
        required: false
        type: boolean
        default: false

  # Automatic publish for tagged releases
  push:
    tags:
      - "v*"

jobs:
  publish:
    uses: soos-io/.github/.github/workflows/npm-publish-workflow.yml@main
    secrets: inherit
    with:
      version: ${{ inputs.version }}
      shrinkwrap: ${{ inputs.shrinkwrap }}
