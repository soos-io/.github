name: Publish to NPM (Pre-release + Release)

on:
  workflow_call:
    inputs:
      version:
        required: false
        type: string
      shrinkwrap:
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Clean Install
        run: npm ci

      - name: Build
        run: npm run build

      # Pre-release logic
      - name: Set pre-release version
        if: ${{ inputs.version != '' }}
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Create npm shrinkwrap
        if: ${{ inputs.shrinkwrap }}
        run: npm shrinkwrap

      - name: Publish pre-release
        if: ${{ inputs.version != '' }}
        run: npm publish --tag next --provenance --access public

      # Release logic
      - name: Publish release
        if: ${{ inputs.version == '' }}
        run: npm publish --provenance --access public
