on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Run SOOS SCA
      uses: soos-io/soos-sca-github-action@v2
      with:
        project_name: ${{ github.event.repository.name }}
        client_id: ${{ secrets.SOOS_CLIENT_ID }}
        api_key: ${{ secrets.SOOS_API_KEY }}
